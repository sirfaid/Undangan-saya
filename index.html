<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        .font-aesthetic { font-family: 'Great Vibes', cursive; }
        body { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="bg-stone-100 text-stone-800">
    <section class="h-screen flex flex-col justify-center items-center text-center p-6 bg-white">
        <h2 class="text-xl tracking-widest uppercase mb-4">The Wedding of</h2>
        <h1 class="text-7xl font-aesthetic text-amber-700 mb-4">Romeo & Juliet</h1>
        <p class="mb-8 text-lg">Minggu, 12 Desember 2026</p>
        <div class="border-t border-b border-stone-300 py-2 px-8">
            SAVE THE DATE
        </div>
    </section>

    <section class="py-20 px-6 text-center bg-stone-50">
        <h2 class="text-4xl font-aesthetic mb-8">Lokasi Acara</h2>
        <p class="mb-4 font-bold">Gedung Serbaguna Indah</p>
        <p class="mb-8 italic">Jl. Mawar No. 123, Kota Bahagia</p>
        <a href="https://maps.google.com" class="bg-amber-700 text-white px-8 py-3 rounded-full hover:bg-amber-800 transition">Buka Google Maps</a>
    </section>

    <section class="py-20 px-6 text-center">
        <h2 class="text-3xl font-aesthetic mb-6">Konfirmasi Kehadiran</h2>
        <p class="mb-8">Mohon konfirmasi kehadiran Anda melalui WhatsApp di bawah ini:</p>
        <a href="https://wa.me/628123456789?text=Halo,%20saya%20akan%20datang%20ke%20pernikahan%20Anda" class="bg-green-600 text-white px-8 py-3 rounded-full font-bold">Konfirmasi via WhatsApp</a>
    </section>
</body>
</html>

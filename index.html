<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .font-aesthetic { font-family: 'Great Vibes', cursive; }
        body { font-family: 'Montserrat', sans-serif; }
        #mainContent { display: none; } /* Konten utama disembunyikan dulu */
    </style>
</head>
<body class="bg-stone-50 text-stone-800">

    <div id="coverPage" class="fixed inset-0 z-50 flex flex-col justify-center items-center text-center bg-white p-6">
        <h2 class="text-stone-500 tracking-[0.3em] uppercase mb-4 text-sm">The Wedding of</h2>
        <h1 class="text-7xl font-aesthetic text-amber-700 mb-4">Romeo & Juliet</h1>
        <p class="text-lg tracking-widest mb-8">12 . 12 . 2026</p>
        
        <button onclick="bukaUndangan()" class="bg-amber-700 text-white px-10 py-4 rounded-full shadow-xl hover:scale-105 transition active:bg-amber-900 z-[60] cursor-pointer">
            BUKA UNDANGAN
        </button>
    </div>

    <div id="mainContent">
        <section class="py-16 bg-stone-100 text-center">
            <h2 class="text-2xl font-semibold mb-8">Menuju Hari Bahagia</h2>
            <div class="flex justify-center gap-4">
                <div class="bg-amber-700 text-white p-4 rounded-lg w-20">
                    <span id="days" class="text-2xl font-bold">00</span>
                    <p class="text-[10px] uppercase">Hari</p>
                </div>
                <div class="bg-amber-700 text-white p-4 rounded-lg w-20">
                    <span id="hours" class="text-2xl font-bold">00</span>
                    <p class="text-[10px] uppercase">Jam</p>
                </div>
                <div class="bg-amber-700 text-white p-4 rounded-lg w-20">
                    <span id="minutes" class="text-2xl font-bold">00</span>
                    <p class="text-[10px] uppercase">Menit</p>
                </div>
            </div>
        </section>

        <section class="py-20 px-6 text-center bg-white">
            <h2 class="text-4xl font-aesthetic text-amber-700 mb-8">Kado Digital</h2>
            <div class="p-6 bg-stone-50 border border-stone-200 rounded-xl max-w-sm mx-auto">
                <p class="font-bold">Bank BCA</p>
                <p class="text-xl text-amber-700">1234567890</p>
                <p class="text-sm italic">a/n Romeo Putra</p>
            </div>
        </section>

        <footer class="py-10 text-center text-stone-400 text-xs">
            Created by Sirfaid Invitation
        </footer>
    </div>

    <audio id="lagu" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
    </audio>

    <script>
        function bukaUndangan() {
            // 1. Putar Musik
            var audio = document.getElementById("lagu");
            audio.play().catch(function(e) { console.log("Musik tertunda"); });

            // 2. Hilangkan Sampul
            document.getElementById("coverPage").style.display = "none";

            // 3. Tampilkan Konten Utama
            document.getElementById("mainContent").style.display = "block";

            // 4. Reset Scroll ke atas
            window.scrollTo(0, 0);
        }

        // Script Countdown Sederhana
        const targetDate = new Date("Dec 12, 2026 08:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        }, 1000);
    </script>
</body>
</html>

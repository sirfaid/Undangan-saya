<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        .font-aesthetic { font-family: 'Great Vibes', cursive; }
        body { font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        #konten-utama { display: none; }
    </style>
</head>
<body class="bg-stone-50">

    <div id="halaman-sampul" class="fixed inset-0 z-[100] flex flex-col justify-center items-center text-center bg-white p-6">
        <h2 class="text-stone-500 tracking-[0.3em] uppercase mb-4 text-sm">The Wedding of</h2>
        <h1 class="text-6xl font-aesthetic text-amber-700 mb-4">Romeo & Juliet</h1>
        <p class="text-lg tracking-widest mb-10">12 . 12 . 2026</p>
        
        <button onclick="bukaSekarang()" class="bg-amber-700 text-white px-10 py-4 rounded-full shadow-2xl font-bold tracking-widest active:scale-95 transition-all">
            BUKA UNDANGAN
        </button>
    </div>

    <div id="konten-utama">
        <section class="min-h-screen py-20 px-6 text-center flex flex-col justify-center">
            <h2 class="text-4xl font-aesthetic text-amber-700 mb-6">Selamat Datang</h2>
            <p class="mb-10 text-stone-600 italic">"Dan di antara tanda-tanda kekuasaan-Nya ialah Dia menciptakan untukmu isteri-isteri dari jenismu sendiri..."</p>
            
            <div class="bg-white p-8 rounded-2xl shadow-lg border border-stone-200 max-w-sm mx-auto">
                <h3 class="text-xl font-bold mb-4">Kado Digital</h3>
                <p class="text-stone-500 mb-2">Bank BCA</p>
                <p class="text-2xl font-mono text-amber-700 mb-2">1234567890</p>
                <p class="text-sm">a/n Romeo Putra</p>
            </div>
        </section>
    </div>

    <script>
        function bukaSekarang() {
            // Hilangkan Sampul
            document.getElementById('halaman-sampul').style.display = 'none';
            
            // Tampilkan Isi
            document.getElementById('konten-utama').style.display = 'block';
            
            // Scroll otomatis ke atas
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>

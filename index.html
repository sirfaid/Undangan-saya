<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Premium - Rara & Adi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .font-aesthetic { font-family: 'Great Vibes', cursive; }
        body { font-family: 'Montserrat', sans-serif; }
        #konten-utama { display: none; }
        
        /* Gaya Sampul dengan Background */
        #halaman-sampul {
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
            background-position: center;
        }

        /* Foto Arch (Lengkung) */
        .img-arch {
            width: 150px;
            height: 200px;
            border-radius: 100px 100px 0 0;
            object-fit: cover;
            border: 4px solid white;
        }

        /* Navigasi Bawah */
        .nav-bottom {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 99;
        }

        /* Tombol Musik di Kanan Bawah */
        .music-control {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: #b4975a;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            animation: spin 4s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        .paused { animation-play-state: paused; }
    </style>
</head>
<body class="bg-stone-50">

    <div id="halaman-sampul" class="fixed inset-0 z-[100] flex flex-col justify-center items-center text-center text-white p-6">
        <img src="https://images.unsplash.com/photo-1583939003579-730e3918a45a?auto=format&fit=crop&w=500&q=60" class="img-arch mb-6 shadow-2xl">
        
        <h2 class="tracking-[0.3em] uppercase mb-2 text-xs">The Wedding of</h2>
        <h1 class="text-6xl font-aesthetic text-amber-200 mb-4">Rara & Adi</h1>
        
        <div class="bg-white/20 backdrop-blur-sm p-4 rounded-xl mb-6 border border-white/30">
            <p class="text-xs italic mb-1">Kepada Yth:</p>
            <h3 id="nama-tamu" class="text-lg font-bold uppercase tracking-widest text-white">Budi & Ani</h3>
            <p class="text-[10px] mt-1">di Bandung</p>
        </div>

        <button onclick="bukaUndangan()" class="bg-amber-200 text-stone-800 px-8 py-3 rounded-full font-bold tracking-widest text-sm flex items-center gap-2 hover:scale-105 transition-all">
            <i class="fa-solid fa-envelope-open"></i> BUKA UNDANGAN
        </button>
    </div>

    <div id="music-btn" class="music-control hidden" onclick="toggleMusik()">
        <i id="music-icon" class="fa-solid fa-music"></i>
    </div>

    <div id="nav-menu" class="nav-bottom hidden">
        <a href="#mempelai" class="text-stone-600 hover:text-amber-700"><i class="fa-solid fa-user-friends"></i></a>
        <a href="#countdown" class="text-stone-600 hover:text-amber-700"><i class="fa-solid fa-calendar-days"></i></a>
        <a href="#lokasi" class="text-stone-600 hover:text-amber-700"><i class="fa-solid fa-map-location-dot"></i></a>
        <a href="#rsvp" class="text-stone-600 hover:text-amber-700"><i class="fa-solid fa-comment-dots"></i></a>
    </div>

    <div id="konten-utama" class="pb-24">
        <section id="mempelai" class="py-20 text-center">
            <h2 class="text-4xl font-aesthetic text-amber-700 mb-10">Mempelai</h2>
            <p>Isi konten mempelai di sini...</p>
        </section>

        <section id="countdown" class="py-20 bg-white text-center">
            <h2 class="text-xl font-bold mb-4">Senin, 31 Agustus 2026</h2>
            <p>Isi hitung mundur di sini...</p>
        </section>

        <section id="lokasi" class="py-20 text-center">
            <h2 class="text-3xl font-aesthetic text-amber-700">Lokasi</h2>
            <p>Isi Maps di sini...</p>
        </section>
        
        <section id="rsvp" class="py-20 bg-white text-center">
            <h2 class="text-3xl font-aesthetic text-amber-700">RSVP</h2>
            <p>Isi Form di sini...</p>
        </section>
    </div>

    <audio id="musik" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('musik');
        const musicBtn = document.getElementById('music-btn');
        const musicIcon = document.getElementById('music-icon');

        function bukaUndangan() {
            document.getElementById('halaman-sampul').classList.add('hidden');
            document.getElementById('konten-utama').style.display = 'block';
            document.getElementById('nav-menu').classList.remove('hidden');
            document.getElementById('music-btn').classList.remove('hidden');
            
            audio.play();
            window.scrollTo(0, 0);
        }

        function toggleMusik() {
            if (audio.paused) {
                audio.play();
                musicIcon.classList.replace('fa-play', 'fa-music');
                musicBtn.classList.remove('paused');
            } else {
                audio.pause();
                musicIcon.classList.replace('fa-music', 'fa-play');
                musicBtn.classList.add('paused');
            }
        }
    </script>
</body>
</html>
